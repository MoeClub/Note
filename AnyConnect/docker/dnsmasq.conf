except-interface=eth0
conf-dir=/etc/dnsmasq.d/,*.conf
dhcp-range=192.168.144.2,192.168.144.254,255.255.255.0,24h
dhcp-option-force=option:router,192.168.144.1
dhcp-option-force=option:dns-server,192.168.144.1
dhcp-option-force=option:netbios-ns,192.168.144.1
listen-address=127.0.0.1,192.168.144.1
srv-host=_vlmcs._tcp,192.168.144.1,1688,0,100
srv-host=_vlmcs._tcp.lan,192.168.144.1,1688,0,100
srv-host=_vlmcs._tcp.srv,192.168.144.1,1688,0,100

local-service
domain-needed
bind-dynamic
strict-order
bogus-priv
no-negcache
no-resolv
no-hosts
no-poll
no-ping

# filter-rr=AAAA
filter-rr=HTTPS

user=root
group=root

max-cache-ttl=128
cache-size=1024
server=8.8.4.4#53
server=1.1.1.1#53


